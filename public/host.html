<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Nanna STORE Quiz til Marius - Host</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="host-body">
  <main class="container host-grid">
    <section class="panel card" id="loginCard">
      <h1>Nanna STORE Quiz til Marius</h1>
      <p class="muted">Host login</p>
      <label for="hostPin">Host PIN</label>
      <input id="hostPin" type="password" placeholder="1234" />
      <button id="loginBtn" class="btn">Log ind</button>
    </section>

    <section id="hostPanel" class="hidden host-content">
      <div class="card">
        <h2>Status</h2>
        <div class="kv">
          <span>Fase</span><strong id="phaseLabel">-</strong>
          <span>Spørgsmål</span><strong id="questionLabel">-</strong>
          <span>Svar inde</span><strong id="answersCount">0</strong>
          <span>Marius</span><strong id="mariusStatus">Mangler svar</strong>
          <span>Deltagere klar</span><strong id="connectedGuests">0</strong>
        </div>
        <div class="row">
          <label for="questionCount">Hvor mange spørgsmål skal bruges?</label>
          <input id="questionCount" type="number" min="1" max="50" />
          <button id="setQuestionCountBtn" class="btn secondary">Gem antal</button>
        </div>
        <div class="btn-wrap">
          <button id="startBtn" class="btn">Start spil</button>
          <button id="lockBtn" class="btn secondary">Lås spørgsmål</button>
          <button id="revealBtn" class="btn secondary">Afslør svar</button>
          <button id="scoreboardBtn" class="btn secondary">Vis Top 3</button>
          <button id="nextBtn" class="btn">Næste spørgsmål</button>
          <button id="finishBtn" class="btn">Finale nu</button>
          <button id="resetBtn" class="btn danger">Nulstil</button>
        </div>
      </div>

      <div class="card">
        <h2>Rediger spørgsmål</h2>
        <div class="row">
          <select id="questionSelect"></select>
          <button id="newQuestionBtn" class="btn secondary">Nyt</button>
          <button id="deleteQuestionBtn" class="btn danger">Slet</button>
        </div>
        <label for="qPrompt">Spørgsmål</label>
        <textarea id="qPrompt" rows="3"></textarea>
        <div class="row">
          <label><input type="radio" name="qType" value="single" checked /> Single choice</label>
          <label><input type="radio" name="qType" value="multi" /> Multi choice</label>
          <label>Tid (sek) <input id="qTime" type="number" min="5" max="90" /></label>
          <label><input id="qEnabled" type="checkbox" checked /> Aktiv</label>
        </div>
        <div id="optionsWrap"></div>
        <label for="qRevealText">Reveal tekst</label>
        <textarea id="qRevealText" rows="2"></textarea>

        <div class="row upload-row">
          <div>
            <label>Spørgsmålsbillede URL</label>
            <input id="qQuestionImageUrl" type="text" placeholder="/uploads/..." />
          </div>
          <div>
            <label>Reveal billede URL</label>
            <input id="qRevealImageUrl" type="text" placeholder="/uploads/..." />
          </div>
        </div>
        <div class="row">
          <label>Upload billede <input id="imageUpload" type="file" accept="image/*" /></label>
          <button id="saveQuestionBtn" class="btn">Gem spørgsmål</button>
          <button id="importMdBtn" class="btn secondary">Importer Questions.md</button>
        </div>
        <p class="muted">Tip: du kan copy/paste et billede direkte på siden - det uploades til serveren.</p>
      </div>

      <div class="card">
        <h2>Genveje</h2>
        <p><a href="/screen" target="_blank" rel="noreferrer">/screen</a> · <a href="/play" target="_blank" rel="noreferrer">/play</a> · <a href="/marius" target="_blank" rel="noreferrer">/marius</a></p>
      </div>
      <div id="notice" class="notice hidden"></div>
    </section>
  </main>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/host.js"></script>
</body>
</html>
