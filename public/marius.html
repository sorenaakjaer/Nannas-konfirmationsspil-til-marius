<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Nanna STORE Quiz til Marius - Marius</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="marius-body">
  <div class="site-brand-banner">
    <div class="site-brand-shell">
      <div class="site-brand-text">
        <span id="brandHostText" class="brand-nanna">Nannas</span>
        <span class="brand-store">STORE</span>
        <span class="brand-rest">quiz til</span>
        <span id="brandCelebrantText" class="brand-marius">Marius</span>
      </div>
      <div class="site-breaking">
        <span class="breaking-dot"></span>
        <span id="liveLineText" class="breaking-label">Live fra konfirmationen den 2. maj i Den Japanske Have</span>
      </div>
    </div>
  </div>
  <main class="container mobile-shell">
    <section id="loginCard" class="card mobile-hero vip-card">
      <div class="eyebrow">Star Player</div>
      <h1 id="konfirmantHeading">Marius</h1>
      <p class="muted">Dit svar afsløres først, når hosten viser det på skærmen.</p>
      <input id="mariusPin" type="password" placeholder="Marius PIN" />
      <button id="loginBtn" class="btn">Log ind</button>
    </section>

    <section id="panel" class="hidden">
      <div class="card question-shell vip-card">
        <div id="phaseText" class="phase-chip">Venter...</div>
        <h2 id="questionPrompt" class="question-title">-</h2>
        <img id="questionImage" class="question-image hidden" alt="Spørgsmålsbillede" />
        <div id="optionGrid" class="option-grid"></div>
        <div class="auto-save-note">Dit svar gemmes automatisk, når du trykker. Du kan ændre det, så længe tiden kører.</div>
        <p id="feedback" class="feedback-line muted"></p>
      </div>
    </section>
  </main>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/marius.js"></script>
</body>
</html>
