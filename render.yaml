services:
  - type: web
    name: nanna-store-quiz
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: HOST_PIN
        sync: false
      - key: MARIUS_PIN
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
