# Render.com Blueprint — one-click deploy
# https://render.com/docs/blueprint-spec
#
# How to use:
#   1. Push this repo to GitHub (already done)
#   2. Go to https://dashboard.render.com/blueprints
#   3. Click "New Blueprint Instance"
#   4. Select your quiz_emil repo
#   5. Render reads this file, asks you to set HOST_PIN and EMIL_PIN, deploys
#   6. Get a public URL like https://alle-mod-emil.onrender.com
#
# Note: Render's free tier sleeps after 15 min of inactivity.
# Wake it up by visiting the URL ~1 min before the party starts.

services:
  - type: web
    name: alle-mod-emil
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: HOST_PIN
        sync: false   # You'll be prompted to enter this in Render dashboard
      - key: EMIL_PIN
        sync: false   # You'll be prompted to enter this in Render dashboard
      # PUBLIC_BASE_URL is intentionally NOT set — server.js auto-detects
      # the host from the request (works on Render thanks to trust proxy).
